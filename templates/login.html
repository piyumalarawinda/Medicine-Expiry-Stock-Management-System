<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Pharmacy Manager - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased">
    <div class="min-h-screen flex flex-col">
        <header
            class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-6 py-4 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="text-primary">
                    <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Logo" class="size-8">
                </div>
                <h2 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">Pharmacy Manager</h2>
            </div>
        </header>
        <main class="flex-1 flex items-center justify-center p-4 sm:p-6">
            <div class="w-full max-w-md">
                <div
                    class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-800">
                    <div class="pt-8 pb-6 px-8 flex flex-col items-center">
                        <div class="size-24 rounded-full bg-slate-200 dark:bg-slate-800 border-4 border-white dark:border-slate-700 shadow-sm overflow-hidden bg-cover bg-center"
                            style='background-image: url("https://ui-avatars.com/api/?name=Admin&background=137fec&color=fff");'>
                        </div>
                        <div class="mt-4 text-center">
                            <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Welcome Back</h1>
                            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Please sign in to access your
                                inventory</p>
                        </div>
                    </div>

                    {% with messages = get_flashed_messages() %}
                    {% if messages %}
                    {% for message in messages %}
                    <div class="mx-8 mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center">
                        {{ message }}
                    </div>
                    {% endfor %}
                    {% endif %}
                    {% endwith %}

                    <form class="px-8 pb-8 flex flex-col gap-5" method="POST">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-medium text-slate-700 dark:text-slate-300"
                                for="username">Username</label>
                            <input
                                class="w-full h-12 rounded-lg border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white px-4 focus:ring-2 focus:ring-primary/20 focus:border-primary placeholder:text-slate-400 dark:placeholder:text-slate-500 text-base transition-all"
                                id="username" name="username" placeholder="Enter your username" type="text" required />
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <div class="flex items-center justify-between">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300"
                                    for="password">Password</label>
                                <a class="text-xs font-semibold text-primary hover:text-blue-600 transition-colors"
                                    href="{{ url_for('forgot_password') }}">Forgot your password?</a>
                            </div>
                            <input
                                class="w-full h-12 rounded-lg border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white px-4 focus:ring-2 focus:ring-primary/20 focus:border-primary placeholder:text-slate-400 dark:placeholder:text-slate-500 text-base transition-all"
                                id="password" name="password" placeholder="Enter your password" type="password"
                                required />
                        </div>
                        <button
                            class="w-full h-12 bg-primary hover:bg-blue-600 text-white font-bold rounded-lg shadow-md hover:shadow-lg transition-all duration-200 flex items-center justify-center gap-2 mt-2"
                            type="submit">
                            <span>Sign In</span>
                            <span class="material-symbols-outlined text-lg">login</span>
                        </button>
                    </form>
                    <div
                        class="bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 py-4 px-8 text-center text-xs text-slate-500 italic">
                        Default login: admin / admin123
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
